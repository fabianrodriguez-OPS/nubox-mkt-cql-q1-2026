name: Refresh dashboard (hourly)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet requests

      - name: Build dashboard
        env:
          HUBSPOT_API_TOKEN: ${{ secrets.HUBSPOT_API_TOKEN }}
        run: python build_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data-snapshot.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            ts=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: refresh dashboard ($ts)"
            git push
          fi
